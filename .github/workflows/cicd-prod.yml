# =============================================================================
# GITHUB ACTIONS - Frontend Production CI/CD
# =============================================================================

name: 🚀 Deploy Frontend to Production

on:
  release:
    types: [published]
  
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  AWS_REGION: ap-southeast-1
  AWS_ACCOUNT_ID: 123456789012
  ECR_REPOSITORY: crexy-frontend
  INFRA_REPO: your-username/crexy-infrastructure
  ENVIRONMENT: production

jobs:
  validate:
    name: ✅ Validate Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: 🏷️ Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version: $VERSION"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Version: $VERSION"

  test:
    name: 🧪 Test & Build Check
    runs-on: ubuntu-latest
    needs: [validate]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.version }}
      
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: 📦 Install dependencies
        run: npm ci
      
      - name: 🔍 Run linter
        run: npm run lint
      
      - name: 🏗️ Production build test
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.crexy.me

  build-and-push:
    name: 🏗️ Build Production Image
    runs-on: ubuntu-latest
    needs: [validate, test]
    
    outputs:
      image_full: ${{ steps.image.outputs.full }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.version }}
      
      - name: 🏷️ Set image name
        id: image
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          FULL_IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}:$VERSION"
          
          echo "full=$FULL_IMAGE" >> $GITHUB_OUTPUT
          echo "📦 Production Image: $FULL_IMAGE"
      
      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: 🔐 Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: 🏗️ Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.full }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:release-latest
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production
            NEXT_PUBLIC_API_URL=https://api.crexy.me
            VERSION=${{ needs.validate.outputs.version }}
      
      - name: ✅ Build summary
        run: |
          echo "## 🎉 Production Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.image.outputs.full }}\`" >> $GITHUB_STEP_SUMMARY

  update-gitops:
    name: 📝 Update Production Config
    runs-on: ubuntu-latest
    needs: [validate, build-and-push]
    
    environment: production
    
    steps:
      - name: 📥 Checkout infrastructure repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: infra
      
      - name: 📝 Update production image
        run: |
          cd infra/overlays/production
          
          VERSION="${{ needs.validate.outputs.version }}"
          
          # Update newTag cho frontend
          sed -i "/name: crexy-frontend/,/newTag:/ s|newTag: .*|newTag: $VERSION|" kustomization.yaml
          
          echo "✅ Updated production to: $VERSION"
          cat kustomization.yaml
      
      - name: 💾 Commit and push
        run: |
          cd infra
          
          git config user.name "GitHub Actions Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add overlays/production/kustomization.yaml
          
          git commit -m "🎨 [PRODUCTION] Release frontend ${{ needs.validate.outputs.version }}" \
                     -m "Release: ${{ github.repository }}@${{ needs.validate.outputs.version }}" \
                     -m "Author: ${{ github.actor }}" || {
            echo "ℹ️ No changes"
            exit 0
          }
          
          git push
          
          echo "✅ Updated production infrastructure"
      
      - name: 📢 Summary
        run: |
          echo "## 🚀 Production Deployment!" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.validate.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ needs.build-and-push.outputs.image_full }}\`" >> $GITHUB_STEP_SUMMARY
